name: Mobile Android Build

on:
    workflow_dispatch:
        inputs:
            build_type:
                description: APK build type
                required: true
                default: debug
                type: choice
                options:
                    - debug
                    - release
    push:
        branches:
            - main
            - dev
        paths:
            - 'mobile/**'
            - '.github/workflows/mobile-android.yml'
    pull_request:
        paths:
            - 'mobile/**'
            - '.github/workflows/mobile-android.yml'

jobs:
    android-build:
        runs-on: ubuntu-latest
        env:
            BUILD_TYPE: ${{ inputs.build_type || 'debug' }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: mobile/package-lock.json

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17
                  cache: gradle

            - name: Install dependencies
              run: npm ci
              working-directory: mobile

            - name: Verify TypeScript
              run: npm run typecheck
              working-directory: mobile

            - name: Verify Lint
              run: npm run lint
              working-directory: mobile

            - name: Resolve Android build config
              id: resolve
              run: |
                  if [ "${BUILD_TYPE}" = "release" ]; then
                      echo "gradle_task=assembleRelease" >> "$GITHUB_OUTPUT"
                      echo "artifact_name=hapi-mobile-release-apk" >> "$GITHUB_OUTPUT"
                      echo "artifact_path=mobile/android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
                  else
                      echo "gradle_task=assembleDebug" >> "$GITHUB_OUTPUT"
                      echo "artifact_name=hapi-mobile-debug-apk" >> "$GITHUB_OUTPUT"
                      echo "artifact_path=mobile/android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
                  fi

            - name: Build APK
              run: ./gradlew ${{ steps.resolve.outputs.gradle_task }}
              working-directory: mobile/android

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.resolve.outputs.artifact_name }}
                  path: ${{ steps.resolve.outputs.artifact_path }}
                  if-no-files-found: error
